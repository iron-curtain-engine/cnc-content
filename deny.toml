# cargo-deny configuration for cnc-content
# This crate is GPL-3.0-or-later — dependencies must be GPL-compatible.

[advisories]
yanked = "deny"
ignore = [
    # Transitive dependencies from librqbit — we cannot upgrade these
    # until librqbit releases a version that drops them.
    "RUSTSEC-2025-0012", # backoff (unmaintained) — via librqbit
    "RUSTSEC-2025-0141", # bincode (unmaintained) — via librqbit
    "RUSTSEC-2025-0060", # crypto-hash (unmaintained) — via librqbit
    "RUSTSEC-2024-0384", # instant (unmaintained) — via backoff via librqbit
    "RUSTSEC-2026-0097", # rand unsoundness with custom logger — via librqbit;
    # cnc-content does not use a custom logger with rand::rng()
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Unlicense",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "GPL-3.0-or-later",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "Zlib",
]

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/iron-curtain-engine/cnc-formats"]
