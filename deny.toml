# cargo-deny configuration for cnc-content
# This crate is GPL-3.0-or-later — dependencies must be GPL-compatible.

[advisories]
yanked = "deny"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Unlicense",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "GPL-3.0",
    "CDLA-Permissive-2.0",
    "Zlib",
]

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/iron-curtain-engine/cnc-formats"]
