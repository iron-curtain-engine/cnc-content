#
# Legal freeware content download packages for Iron Curtain.
#
# This file is loaded at compile time via include_str!() and parsed at
# first access. It defines the complete, closed set of content that the
# P2P engine is allowed to distribute. The engine CANNOT download or seed
# arbitrary torrents — only packages listed here are valid targets.
#
# LEGAL BASIS:
#   - Red Alert: EA-declared freeware (2008-08-31)
#   - Tiberian Dawn: EA-declared freeware (2007-08-31), GPL-3.0 source (2025-02)
#   - NO other games have download packages (Dune 2, Dune 2000, TS, RA2,
#     Generals are local-source-only — users must provide their own copies)
#
# FORMAT:
#   Each [[download]] block defines one download package. Fields:
#     id              — DownloadId enum variant name
#     game            — GameId enum variant name
#     title           — Human-readable description
#     mirror_list_url — URL returning newline-separated mirror list (empty if direct-only)
#     direct_urls     — Direct download URLs (tried in order)
#     sha1            — SHA-1 of the downloaded archive (40 hex, all-zero = placeholder)
#     info_hash       — BitTorrent v1 info hash (40 hex, empty = no torrent)
#     trackers        — Per-package tracker announce URLs
#     web_seeds       — BEP 19 web seed URLs (HTTP mirrors with Range support)
#     provides        — PackageId variants this download provides
#     format          — Archive format hint: "zip", "iso", "raw"
#     size_hint       — Approximate download size in bytes


